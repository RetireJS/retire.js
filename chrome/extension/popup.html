<!DOCTYPE html>
<html lang="en">
<head>
<script src="js/popup.js" defer></script>
<style type="text/css">
	html { padding: 0; margin: 0;}
	* { box-sizing: border-box; }
	body { padding:0; margin: 0.5em 1em; width: calc(800px - 2em); box-sizing: border-box; }
	.enabler { float: right; padding-top: 0.5em; display: flex; align-items: center;}
	.vulnerable a { text-decoration: none; }
	.hideunknown .unknown { display: none; }
	.unknown { color: #999; border-top: 1px solid #ddd; padding: 0.3em 0;
		overflow-wrap: break-word;
		word-break: normal;
		hyphens: none;
	}
	h1 { margin: 0; }
	.detection-url { margin: 0.2em 0em; }
	.detection-method { color: #999; }
	#stats span { color: #999; margin-right: 1em; font-style: italic; text-transform: capitalize;}
	#stats .critical { color: darkred; text-transform: capitalize; }
	#stats .high { color: #f00; text-transform: capitalize; }
	#stats .medium { color: rgb(200, 110, 0); text-transform: capitalize; }
	#stats .low { color: rgb(131, 96, 0); text-transform: capitalize; }
	#results details { border-top: 1px solid #ddd; padding: 0.3em 0; }
	#results summary {
		cursor: pointer;
		display: flex;
		align-items: center;
		gap: 0.5em;
		list-style: none;
		user-select: none;
	}
	#results summary::-webkit-details-marker { display: none;  }
	.lib-name { font-weight: bold; flex: 1; }
	.details-body { margin-top: 0.5em; padding-left: 1em; overflow-wrap: break-word;
		word-break: normal;
		hyphens: auto;
	}
	.vuln-item { border-top: 1px solid #ddd; padding: 0.3em 0; }
	.vuln-item > summary { align-items: start; flex-wrap: nowrap; }
	.severity-text { font-weight: bold; text-transform: capitalize; flex-shrink: 0; width: 5em; }
	.vuln-summary {
		flex: 1;
		position: relative;
		overflow-wrap: break-word;
	}
	.vuln-item:not([open]) > summary .vuln-summary {
		max-height: 2.8em;
		overflow: hidden;
	}
	.vuln-item:not([open]) > summary .vuln-summary::after {
		content: '';
		position: absolute;
		bottom: 0; left: 0; right: 0;
		height: 1.4em;
		background: linear-gradient(to bottom, transparent, white);
		pointer-events: none;
	}
	.vuln-body { padding: 0.3em 0 0.2em 5.5em; }
	.id-chips { display: flex; flex-wrap: wrap; gap: 0.3em; margin-bottom: 0.3em; }
	.id-chip {
		font-family: monospace;
		font-size: 0.85em;
		background: #555;
		color: #fff;
		padding: 0.25em 1em;
		border-radius: 1em;
		white-space: nowrap;
	}
	.details-text { margin: 0.3em 0 0.5em; white-space: pre-wrap; }
	.info-links { margin: 0; padding-left: 1.2em; }
	.info-links a { color: inherit; }
	.severity-badge {
		color: #fff !important;
		font-size: 0.75em;
		font-weight: normal;
		padding: 0.25em 1em;
		border-radius: 1em;
		white-space: nowrap;
		text-transform: capitalize;
	}
	.severity-badge.critical { background: darkred; }
	.severity-badge.high { background: #f00; }
	.severity-badge.medium { background: rgb(200, 110, 0); }
	.severity-badge.low { background: rgb(131, 96, 0); }
	.vulnerable.critical > summary { color: darkred; }
	.vulnerable.high > summary { color: #f00; }
	.vulnerable.medium > summary { color: rgb(200, 110, 0); }
	.vulnerable.low > summary { color: rgb(131, 96, 0); }
	.vuln-item.critical > summary .severity-text { color: darkred; }
	.vuln-item.high > summary .severity-text { color: #f00; }
	.vuln-item.medium > summary .severity-text { color: rgb(200, 110, 0); }
	.vuln-item.low > summary .severity-text { color: rgb(131, 96, 0); }
</style>
</head>
<body>
<div class="enabler">
<input type="checkbox" id="enabled">Enabled</input>
<input type="checkbox" id="deepEnabled">Deep scan</input>
<input type="checkbox" id="unknown">Show unknown</input>
</div>
<h1>Retire.js</h1>
<header id="stats"></header>
<div id="results" class="hideunknown">
</div>
</body>
</html>
